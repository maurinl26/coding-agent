services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-code-agent
    ports:
      - "8000:8000"         # Serveur MCP HTTP/SSE → Antigravity
    volumes:
      # Monte le workspace en lecture-écriture dans le conteneur
      - ${AGENT_WORKSPACE:-.}:/workspace
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral-nemo:12b}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-15}
      AGENT_WORKSPACE: /workspace
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      API_KEY: ${API_KEY:-}  # Si défini, active l'authentification Bearer sur le port 8000
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    # Sandbox réseau : l'agent ne peut parler qu'à ollama
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  ollama_data:
