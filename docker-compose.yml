services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: local-code-agent
    ports:
      - "8000:8000"         # Serveur MCP HTTP/SSE → Antigravity
    volumes:
      # Monte le workspace en lecture-écriture dans le conteneur
      - ${AGENT_WORKSPACE:-.}:/workspace
    environment:
      AZURE_MISTRAL_ENDPOINT: ${AZURE_MISTRAL_ENDPOINT}
      AZURE_MISTRAL_API_KEY: ${AZURE_MISTRAL_API_KEY}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      AGENT_MAX_ITERATIONS: ${AGENT_MAX_ITERATIONS:-15}
      AGENT_WORKSPACE: /workspace
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      API_KEY: ${API_KEY:-}  # Si défini, active l'authentification Bearer
    restart: unless-stopped
